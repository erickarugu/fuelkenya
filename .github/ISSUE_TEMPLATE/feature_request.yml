name: Feature request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you're experiencing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you ruled out.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Web dashboard
        - Docs
        - Data ingestion
        - Other
    validations:
      required: true
