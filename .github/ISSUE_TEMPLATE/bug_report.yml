name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much as you can.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API (FastAPI backend)
        - Web dashboard
        - Docs site
        - Data / prices
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Call endpoint ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Relevant versions
      description: Node version, Python version, browser, OS — whatever applies.
      placeholder: "Node 20.x, Python 3.12, Chrome 125, Ubuntu 22.04"
